version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 7756
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
